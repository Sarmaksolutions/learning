<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - SARMAK Registration</title>
    <style>
      body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; background: #0d0e10; color: #f7f7f7; display: flex; align-items: center; justify-content: center; }
      .container { max-width: 700px; padding: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); }
      .button { margin-top: 28px; display: inline-flex; align-items: center; justify-content: center; padding: 16px 28px; border-radius: 999px; background: linear-gradient(90deg, #22c55e, #4ade80); color: #0d0e10; font-weight: 700; text-decoration: none; }
      .label { display: inline-block; margin-bottom: 16px; padding: 10px 14px; background: rgba(255,209,0,0.15); color: #ffd600; text-transform: uppercase; letter-spacing: 0.28em; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="label">Registration Received</span>
      <h1>Thank you for registering!</h1>
      <p style="color: rgba(255,255,255,0.72); font-size: 1.05rem; line-height: 1.8; margin-top: 16px;">
        Your registration request has been submitted. We will contact you soon with the next batch details and onboarding information.
      </p>
      <a class="button" href="/">
        Back to SARMAK Learning Portal
      </a>
    </div>
  </body>
</html>
